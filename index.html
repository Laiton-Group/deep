<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEEP · LAITON ecosystem</title>
<style>
*{margin:0;padding:0}
body{background:#07070d;overflow:hidden;font-family:monospace;cursor:default}
canvas{display:block}
#blocker{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(7,7,13,.85);cursor:pointer;transition:opacity .5s}
#blocker.hidden{opacity:0;pointer-events:none}
#blocker h1{color:#fff;font-size:clamp(20px,4vw,48px);font-weight:400;letter-spacing:8px;text-transform:uppercase;margin-bottom:8px;font-family:monospace}
#blocker h1 span{color:#00d4aa}
#blocker p{color:rgba(255,255,255,.25);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px}
#blocker .key{display:inline-block;border:1px solid rgba(255,255,255,.08);padding:6px 12px;border-radius:2px;margin:0 3px;color:rgba(255,255,255,.3);font-size:10px;letter-spacing:2px}
#blocker .click-msg{color:rgba(0,212,170,.5);font-size:12px;letter-spacing:3px;margin-top:20px;border:1px solid rgba(0,212,170,.1);padding:10px 24px;border-radius:4px;transition:.3s}
#blocker .click-msg:hover{background:rgba(0,212,170,.05);border-color:rgba(0,212,170,.2)}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;text-align:center}
#hud .pos{color:rgba(255,255,255,.06);font-size:9px;letter-spacing:2px;font-family:monospace}
#hud .area{color:rgba(0,212,170,.2);font-size:8px;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-family:monospace}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.06)}
#crosshair::before{width:1px;height:12px;top:-6px;left:0}
#crosshair::after{width:12px;height:1px;top:0;left:-6px}
#secret{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:6;pointer-events:none;text-align:center;opacity:0;transition:opacity .6s;font-family:monospace}
#secret.show{opacity:1}
#secret .t{color:#fff;font-size:13px;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 20px rgba(0,212,170,.2)}
#secret .h{color:rgba(0,212,170,.3);font-size:9px;letter-spacing:3px;text-transform:uppercase}
#stats{position:fixed;top:16px;right:16px;z-index:5;pointer-events:none;color:rgba(255,255,255,.04);font-size:8px;letter-spacing:2px;text-align:right;line-height:1.8;font-family:monospace}
#music-btn{position:fixed;top:16px;left:16px;z-index:5;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.15);font-family:monospace;font-size:7px;letter-spacing:2px;padding:5px 10px;border-radius:2px;cursor:pointer;transition:.3s;pointer-events:auto;text-transform:uppercase}
#music-btn:hover{border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div id="blocker">
  <h1><span>⬡</span> DEEP</h1>
  <p>geometric exploration · LAITON ecosystem</p>
  <div><span class="key">W A S D</span> <span style="color:rgba(255,255,255,.1)">move</span></div>
  <div style="margin-top:6px"><span class="key">E</span> <span style="color:rgba(255,255,255,.1)">interact</span> <span class="key">SHIFT</span> <span style="color:rgba(255,255,255,.1)">sprint</span></div>
  <div class="click-msg">✦ click to enter</div>
</div>
<button id="music-btn">♪ music off</button>
<div id="crosshair"></div>
<div id="hud"><div class="pos" id="pos-display">0 0 0</div><div class="area" id="area-display">—</div></div>
<div id="secret"><div class="t" id="secret-text"></div><div class="h" id="secret-hint"></div></div>
<div id="stats">FPS: <span id="fps">0</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();scene.background=new THREE.Color(0x07070d);scene.fog=new THREE.FogExp2(0x07070d,.004)
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,200);camera.position.set(0,1.6,0)
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;document.body.prepend(renderer.domElement)
scene.add(new THREE.AmbientLight(0x111133,.25));scene.add(new THREE.HemisphereLight(0x00d4aa,0x050510,.3))
const sun=new THREE.DirectionalLight(0xffeedd,.8);sun.position.set(10,20,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun)
scene.add(new THREE.DirectionalLight(0x4488ff,.15).position.set(-10,5,-10));scene.add(new THREE.DirectionalLight(0xff00aa,.05).position.set(0,-10,0))

// Music
const audio=new Audio('https://raw.githubusercontent.com/Laiton-Group/hub/main/shiveria.mp3');audio.loop=true;audio.volume=.25
let musicOn=false
document.getElementById('music-btn').addEventListener('click',()=>{musicOn=!musicOn;if(musicOn){audio.play().catch(()=>{});document.getElementById('music-btn').textContent='♪ music on'}else{audio.pause();document.getElementById('music-btn').textContent='♪ music off'}})

const world=new THREE.Group();scene.add(world);const interactables=[]

// ─── Ground ───
const gm=new THREE.Mesh(new THREE.PlaneGeometry(200,200,1,1),new THREE.MeshStandardMaterial({color:0x0a0a18,roughness:.9,metalness:.1}));gm.rotation.x=-Math.PI/2;gm.position.y=-.1;gm.receiveShadow=true;world.add(gm)

// ─── Grid ───
const gGrid=new THREE.Group();const gMat=new THREE.LineBasicMaterial({color:0x111133,transparent:true,opacity:.15})
for(let i=-50;i<=50;i+=4){const g1=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i,0,-50),new THREE.Vector3(i,0,50)]);gGrid.add(new THREE.Line(g1,gMat));const g2=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-50,0,i),new THREE.Vector3(50,0,i)]);gGrid.add(new THREE.Line(g2,gMat))}
gGrid.position.y=-.05;world.add(gGrid)

function hsl(h,s,l){return new THREE.Color().setHSL(h,s,l)}

// ─── Spire ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<20;i++){const y=i*.5,s=3-i*.12;if(s<.3)break;const m=new THREE.Mesh(new THREE.OctahedronGeometry(s,1),new THREE.MeshStandardMaterial({color:hsl(.45+i*.01,.3,.08+i*.02),wireframe:i%3===0,transparent:true,opacity:.1+i*.02,metalness:.2,roughness:.8}));m.position.y=y;m.rotation.y=i*.3;m.scale.y=.3+i*.02;g.add(m)}
const gl=new THREE.Mesh(new THREE.IcosahedronGeometry(.3,2),new THREE.MeshBasicMaterial({color:0x00d4aa,transparent:true,opacity:.08}));gl.position.y=9.5;g.add(gl)
const r=new THREE.Mesh(new THREE.TorusGeometry(2.5,.04,8,48),new THREE.MeshBasicMaterial({color:0x00d4aa,transparent:true,opacity:.05}));r.position.y=1;r.rotation.x=Math.PI/3;g.add(r);g.position.set(0,0,0);world.add(g)})()

// ─── Crystals ───
;(()=>{const g=new THREE.Group();const cs=[0x7c4dff,0x9966ff,0x5533bb,0x00d4aa]
for(let gi=0;gi<4;gi++){const cx=(Math.random()-.5)*6,cz=(Math.random()-.5)*6
for(let i=0;i<8;i++){const h=.3+Math.random()*2;const m=new THREE.Mesh(new THREE.CylinderGeometry(.02+Math.random()*.06,.05+Math.random()*.1,h,4+Math.floor(Math.random()*4)),new THREE.MeshPhysicalMaterial({color:cs[gi%4],emissive:cs[gi%4],emissiveIntensity:.04,transparent:true,opacity:.2+Math.random()*.3,roughness:.1,metalness:0,clearcoat:.2}));const a=Math.random()*Math.PI*2,r=.2+Math.random()*1;m.position.set(cx+Math.cos(a)*r,h/2,cz+Math.sin(a)*r);m.rotation.set((Math.random()-.5)*.3,Math.random()*6,(Math.random()-.5)*.3);m.castShadow=true;g.add(m)}}
g.position.set(-18,0,-15);world.add(g)})()

// ─── Arches ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<5;i++){const span=3+Math.random()*4,height=2+Math.random()*3
const pts=[];for(let j=0;j<=12;j++){const t=j/12,a=t*Math.PI;pts.push(new THREE.Vector3(Math.cos(a)*span/2,Math.sin(a)*height,0))}
const m=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),20,.03+Math.random()*.04,4,false),new THREE.MeshStandardMaterial({color:hsl(.42+Math.random()*.15,.3,.12),transparent:true,opacity:.15+Math.random()*.15,metalness:.5,roughness:.5}));const a2=(i/5)*Math.PI*2,r=2+Math.random()*2;m.position.set(Math.cos(a2)*r,0,Math.sin(a2)*r);m.rotation.y=a2+.3;g.add(m)}
g.position.set(20,0,-18);world.add(g)})()

// ─── Grid neon ───
;(()=>{const g=new THREE.Group()
for(let x=-3;x<=3;x++)for(let z=-3;z<=3;z++){const tile=new THREE.Mesh(new THREE.BoxGeometry(.8,.02,.8),new THREE.MeshStandardMaterial({color:0x111122,transparent:true,opacity:.3,metalness:.5,roughness:.3}));tile.position.set(x*.9,0,z*.9);g.add(tile)}
for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+Math.PI/4;const p=new THREE.Mesh(new THREE.BoxGeometry(.05,3,.05),new THREE.MeshBasicMaterial({color:0x00d4aa,transparent:true,opacity:.04}));p.position.set(Math.cos(a)*4.5,1.5,Math.sin(a)*4.5);g.add(p)}
g.position.set(-25,0,10);world.add(g)})()

// ─── Floating Islands ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<15;i++){const s=.3+Math.random()*1.2;const m=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),new THREE.MeshStandardMaterial({color:hsl(.4+Math.random()*.2,.2,.05+Math.random()*.1),flatShading:true,transparent:true,opacity:.2+Math.random()*.3,roughness:.8,metalness:.1}));const a=Math.random()*Math.PI*2,r=2+Math.random()*4;m.position.set(Math.cos(a)*r,.5+Math.random()*2.5,Math.sin(a)*r);m.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);m.userData={rotSpeed:(Math.random()-.5)*.005};g.add(m)}
g.position.set(25,1,15);world.add(g)})()

// ─── The Ring ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2;const m=new THREE.Mesh(new THREE.OctahedronGeometry(.15,0),new THREE.MeshStandardMaterial({color:hsl(.55+i*.01,.5,.15),wireframe:i%2===0,transparent:true,opacity:.2,metalness:.3,roughness:.7}));m.position.set(Math.cos(a)*5,Math.sin(a*2)*.5+1.5,Math.sin(a)*5);g.add(m)}
const core=new THREE.Mesh(new THREE.IcosahedronGeometry(.8,1),new THREE.MeshPhysicalMaterial({color:0x7c4dff,emissive:0x7c4dff,emissiveIntensity:.05,transparent:true,opacity:.1,roughness:.2,metalness:.3}));core.position.y=1.5;g.add(core)
for(let i=0;i<3;i++){const r=new THREE.Mesh(new THREE.TorusGeometry(2.5+i,.02,8,48),new THREE.MeshBasicMaterial({color:0x7c4dff,transparent:true,opacity:.03}));r.position.y=1.5+i*.5;r.rotation.x=Math.PI/3+i*.2;g.add(r)}
g.position.set(0,0,30);world.add(g)})()

// ─── Abyss Gate ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;const m=new THREE.Mesh(new THREE.TetrahedronGeometry(.08),new THREE.MeshStandardMaterial({color:0x220066,emissive:0x330088,emissiveIntensity:.02,transparent:true,opacity:.15}));m.position.set(Math.cos(a)*2.5,Math.sin(a)*2.5+1.5,0);g.add(m)}
const d=new THREE.Mesh(new THREE.CircleGeometry(2,24),new THREE.MeshBasicMaterial({color:0x000000,side:THREE.DoubleSide,transparent:true,opacity:.3}));d.position.y=1.5;g.add(d)
g.position.set(0,0,-30);world.add(g)})()

// ─── Tetra Forest ───
;(()=>{const g=new THREE.Group()
for(let i=0;i<60;i++){const s=.05+Math.random()*.4;const m=new THREE.Mesh(new THREE.TetrahedronGeometry(s),new THREE.MeshStandardMaterial({color:hsl(.4+Math.random()*.2,.4,.08+Math.random()*.12),transparent:true,opacity:.1+Math.random()*.2,wireframe:Math.random()>.7,roughness:.7,metalness:.2}));const a=Math.random()*Math.PI*2,r=.5+Math.random()*4;m.position.set(Math.cos(a)*r,s*.5,Math.sin(a)*r);m.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);m.castShadow=true;g.add(m)}
g.position.set(-15,0,22);world.add(g)})()

// ─── Particles ───
const pCount=3000,pPos=new Float32Array(pCount*3),pVel=[]
for(let i=0;i<pCount;i++){const r=10+Math.random()*40,theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);pPos[i*3]=Math.sin(phi)*Math.cos(theta)*r;pPos[i*3+1]=Math.sin(phi)*Math.sin(theta)*r*.3;pPos[i*3+2]=Math.cos(phi)*r;pVel.push({x:(Math.random()-.5)*.003,y:(Math.random()-.5)*.002,z:(Math.random()-.5)*.003})}
const pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3))
const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x4444aa,size:.015,transparent:true,opacity:.15,blending:THREE.AdditiveBlending,depthWrite:false}));scene.add(particles)

// ─── Secrets ───
const secretData=[
  {text:'you found the first spire',hint:'it reaches toward nothing',pos:[0,1.5,-3]},{text:'crystals grow in silence',hint:'pressure + time = light',pos:[-18,1.5,-15]},{text:'arches hold only space',hint:'the void between is real',pos:[20,1.5,-18]},{text:'the grid is listening',hint:'every point connected',pos:[-25,1.5,10]},{text:'islands float without ocean',hint:'what ground do you trust?',pos:[25,2.5,15]},{text:'the ring remembers its orbit',hint:'all returns',pos:[0,2.5,30]},{text:'beyond the gate: nothing',hint:'which is everything',pos:[0,2,-30]},{text:'tetrahedrons dream of pyramids',hint:'simplicity compounds',pos:[-15,1,22]},{text:'you are the observer',hint:'the world renders for you',pos:[5,2,5]},{text:'this is not a game',hint:'it is a place',pos:[-8,1,-10]},{text:'the source is within',hint:'⬡',pos:[0,8,0]},{text:'exploration is the answer',hint:'keep moving',pos:[10,1,-22]}
]
let foundSecrets=0
secretData.forEach((sd,idx)=>{const c=document.createElement('canvas');c.width=512;c.height=128;const ctx=c.getContext('2d');ctx.font='32px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#00d4aa';ctx.shadowBlur=20;ctx.fillStyle='rgba(0,212,170,.1)';ctx.fillText(sd.text,256,64);ctx.shadowBlur=10;ctx.fillStyle='rgba(0,212,170,.2)';ctx.fillText(sd.text,256,64);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(sd.text,256,64);const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:0}));s.scale.set(1.5,.375,1);s.position.set(sd.pos[0],sd.pos[1],sd.pos[2]);s.userData={secretIdx:idx,found:false};world.add(s);interactables.push(s)})

function checkSecrets(){interactables.forEach(s=>{if(s.userData.found)return;const d=camera.position.distanceTo(s.position);if(d<3){s.userData.found=true;foundSecrets++;const sd=secretData[s.userData.secretIdx];const el=document.getElementById('secret');document.getElementById('secret-text').textContent=`✦ ${sd.text}`;document.getElementById('secret-hint').textContent=sd.hint;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);s.material.opacity=.2}})}
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='e'&&document.pointerLockElement)checkSecrets()})

// ─── Controls ───
const keys={};let yaw=0,pitch=0;const vel=new THREE.Vector3(),euler=new THREE.Euler(0,0,0,'YXZ')
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true)
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false)
document.addEventListener('mousemove',e=>{if(!document.pointerLockElement)return;yaw-=e.movementX*.002;pitch-=e.movementY*.002;pitch=Math.max(-.8,Math.min(.8,pitch))})
document.addEventListener('click',()=>{if(!document.pointerLockElement){document.getElementById('blocker').classList.add('hidden');renderer.domElement.requestPointerLock()}})
document.addEventListener('pointerlockchange',()=>{if(!document.pointerLockElement)document.getElementById('blocker').classList.remove('hidden')})

const zones=[{n:'CENTRAL SPIRE',p:[0,0,0]},{n:'CRYSTAL GARDEN',p:[-18,0,-15]},{n:'COLOSSAL ARCHES',p:[20,0,-18]},{n:'THE GRID',p:[-25,0,10]},{n:'FLOATING ISLANDS',p:[25,1,15]},{n:'THE RING',p:[0,0,30]},{n:'ABYSS GATE',p:[0,0,-30]},{n:'TETRA FOREST',p:[-15,0,22]}]
function getArea(){let n='—',nd=25;zones.forEach(z=>{const d=camera.position.distanceTo(new THREE.Vector3(z.p[0],z.p[1],z.p[2]));if(d<nd){nd=d;n=z.n}});return n}

let fps=0,fc=0,lastFps=0
function anim(time){requestAnimationFrame(anim)
  fc++;if(time-lastFps>1000){fps=fc;fc=0;lastFps=time;document.getElementById('fps').textContent=fps}
  if(document.pointerLockElement){const sp=keys['shift']?6:3;const f=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));const r=new THREE.Vector3(f.z,0,-f.x);vel.set(0,0,0);if(keys['w']||keys['z'])vel.add(f);if(keys['s'])vel.sub(f);if(keys['a']||keys['q'])vel.sub(r);if(keys['d'])vel.add(r);if(vel.length()>0){vel.normalize().multiplyScalar(sp*.016);camera.position.x+=vel.x;camera.position.z+=vel.z}euler.set(pitch,yaw,0);camera.quaternion.setFromEuler(euler)}
  world.children.forEach(c=>{if(c.userData&&c.userData.rotSpeed){c.rotation.x+=c.userData.rotSpeed;c.rotation.y+=c.userData.rotSpeed*1.5}})
  const pp=particles.geometry.attributes.position.array;for(let i=0;i<pCount;i++){pp[i*3]+=pVel[i].x;pp[i*3+1]+=pVel[i].y;pp[i*3+2]+=pVel[i].z;const r=Math.sqrt(pp[i*3]**2+pp[i*3+1]**2+pp[i*3+2]**2);if(r>55){pp[i*3]*=.97;pp[i*3+1]*=.97;pp[i*3+2]*=.97}}
  particles.geometry.attributes.position.needsUpdate=true
  interactables.forEach(s=>{if(s.userData.found)return;const d=camera.position.distanceTo(s.position);if(d<8)s.material.opacity+=((1-d/8)*.5-s.material.opacity)*.05;else if(s.material.opacity>.01)s.material.opacity-=.01})
  document.getElementById('pos-display').textContent=`${camera.position.x.toFixed(1)} ${camera.position.y.toFixed(1)} ${camera.position.z.toFixed(1)}`
  document.getElementById('area-display').textContent=getArea()
  renderer.render(scene,camera)}
anim()
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})
</script>
</body>
</html>
